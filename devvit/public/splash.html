<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HexLife</title>
    <link rel="modulepreload" href="splash.js">
    <style>
    body {
      margin: 0;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr auto auto auto;
      place-items: center;
      background: #101214;
      color: #c8ccd0;
      font:
        12px / 1.4 ui-monospace,
        monospace;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      width: 100%;
      box-sizing: border-box;
      justify-content: center;
    }
    #controls label {
      opacity: 0.75;
    }
    #speed {
      width: min(60%, 220px);
      accent-color: #6cb6ff;
      cursor: pointer;
    }
    #world {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    #world hexlife-world {
      max-width: min(100vw, 100dvh);
      max-height: 100%;
    }
    #expand-btn {
      margin: 6px;
      padding: 6px 14px;
      border: 1px solid #3a4046;
      border-radius: 999px;
      background: #1a1e22;
      color: #e6e9ec;
      font: inherit;
      cursor: pointer;
    }
    #status {
      padding: 0 8px 6px;
      opacity: 0.75;
    }
    #status[hidden] {
      display: none;
    }
    </style>
  </head>
  <body>
    <main id="world"></main>
    <div id="controls">
      <label for="speed">Speed</label>
      <input id="speed" type="range" min="1" max="120" step="1" value="20">
    </div>
    <button id="expand-btn" type="button">Expand</button>
    <div id="status">Loading…</div>
    <script src="splash.js" type="module"></script>
  </body>
</html>
