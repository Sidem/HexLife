<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HexLife</title>
    <link rel="modulepreload" href="splash.js">
    <link rel="stylesheet" href="chrome.css">
  </head>
  <body data-chrome="feed">
    <header id="identity" hidden>
      <span id="specimen-name">HexLife</span>
      <span id="specimen-hex" class="lab-only"></span>
      <span id="specimen-meta"></span>
      <p id="specimen-sub" class="feed-only">
        a living hexagonal world — press ▶ to run
      </p>
    </header>
    <main id="world"></main>
    <div id="chrome">
      <div id="controls">
        <button
          id="play-pause"
          type="button"
          aria-label="Play"
          title="Play / Pause"
        >
          ▶
        </button>
        <button id="restart" type="button" aria-label="Restart" title="Restart">
          ↺
        </button>
        <label class="lab-only" for="speed">Speed</label>
        <input
          id="speed"
          class="lab-only"
          type="range"
          min="1"
          max="120"
          step="1"
          value="20"
        >
        <button
          class="lab-only"
          id="copy-hex"
          type="button"
          title="Copy full ruleset hex"
        >
          Copy hex
        </button>
      </div>
      <div class="actions">
        <button id="expand-btn" class="feed-only" type="button">Expand</button>
        <button id="create-own" class="quiet" type="button">
          Create your own
        </button>
        <a
          id="open-explorer-quiet"
          class="explorer-link lab-only"
          href="https://sidem.github.io/HexLife/"
          >Open in Explorer</a
        >
        <a
          id="open-explorer"
          class="explorer-link lab-only"
          href="https://sidem.github.io/HexLife/"
          >Open full lab ↗</a
        >
      </div>
      <div id="status">Loading…</div>
      <button id="retry" type="button" hidden>Retry</button>
    </div>
    <script src="splash.js" type="module"></script>
  </body>
</html>
