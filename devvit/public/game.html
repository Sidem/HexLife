<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, maximum-scale=1, minimum-scale=1, user-scalable=no"
    >
    <title>HexLife</title>
    <link rel="modulepreload" href="game.js">
    <style>
    body {
      margin: 0;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr auto auto;
      place-items: center;
      background: #101214;
      color: #c8ccd0;
      font:
        12px / 1.4 ui-monospace,
        monospace;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      width: 100%;
      box-sizing: border-box;
      justify-content: center;
    }
    #controls label {
      opacity: 0.75;
    }
    #speed {
      width: min(60%, 220px);
      accent-color: #6cb6ff;
      cursor: pointer;
    }
    #world {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    /* Square, and never taller than the viewport row it sits in. */
    #world hexlife-world {
      width: min(100%, 100cqmin);
      max-width: min(100vw, 100dvh);
      max-height: 100%;
    }
    #status {
      padding: 4px 8px;
      opacity: 0.75;
    }
    #status[hidden] {
      display: none;
    }
    </style>
  </head>
  <body>
    <main id="world"></main>
    <div id="controls">
      <label for="speed">Speed</label>
      <input id="speed" type="range" min="1" max="120" step="1" value="20">
    </div>
    <div id="status">Loading…</div>
    <script src="game.js" type="module"></script>
  </body>
</html>
